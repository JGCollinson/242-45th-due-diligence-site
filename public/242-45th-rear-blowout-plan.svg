<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1180" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <pattern id="hatch-remove" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#c0392b" stroke-width="2"/>
    </pattern>
    <pattern id="hatch-open" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#2980b9" stroke-width="1.5"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#333"/>
    </marker>
  </defs>

  <rect width="920" height="1180" fill="#fafafa"/>

  <text x="460" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#111">
    242 45th St  Rear blow-out concept (from Sotheby&apos;s floor plan)
  </text>
  <text x="460" y="58" text-anchor="middle" font-size="13" fill="#555">
    Scale ~6 px/ft · Front = 45th St (south) · Rear = yard (north) · Not a survey  for architect discussion only
  </text>

  <!-- GROUND FLOOR PLAN -->
  <text x="40" y="92" font-size="16" font-weight="700" fill="#111">Ground floor  owner unit (Phase 1 + 2A)</text>

  <!-- Building shell: stair hall left + 15' wide room block -->
  <!-- x: hall 0-36 (6'), rooms 36-126 (15'), bay extends to x=132 at front -->
  <!-- y: rear 120, front 420 -->

  <g transform="translate(40, 110)">
    <!-- Outer shell -->
    <rect x="0" y="120" width="90" height="300" fill="#fff" stroke="#333" stroke-width="2"/>
    <!-- Bay window bump at front (Lounge) -->
    <path d="M 36 420 L 36 356 L 96 356 L 96 420 Z" fill="#fff" stroke="#333" stroke-width="2"/>

    <!-- Stair / hall (left) -->
    <rect x="0" y="120" width="36" height="300" fill="#eee" stroke="#333" stroke-width="1.5"/>
    <text x="18" y="275" text-anchor="middle" font-size="10" fill="#444" transform="rotate(-90 18 275)">STAIR HALL</text>
    <!-- Stairs symbol -->
    <g stroke="#666" stroke-width="1" fill="none">
      <line x1="6" y1="380" x2="30" y2="380"/><line x1="6" y1="370" x2="30" y2="370"/>
      <line x1="6" y1="360" x2="30" y2="360"/><line x1="6" y1="350" x2="30" y2="350"/>
      <line x1="6" y1="340" x2="30" y2="340"/><line x1="6" y1="330" x2="30" y2="330"/>
      <line x1="6" y1="320" x2="30" y2="320"/><line x1="6" y1="310" x2="30" y2="310"/>
      <line x1="6" y1="300" x2="30" y2="300"/><line x1="6" y1="290" x2="30" y2="290"/>
      <line x1="6" y1="280" x2="30" y2="280"/><line x1="6" y1="270" x2="30" y2="270"/>
      <line x1="6" y1="260" x2="30" y2="260"/><line x1="6" y1="250" x2="30" y2="250"/>
      <line x1="6" y1="240" x2="30" y2="240"/><line x1="6" y1="230" x2="30" y2="230"/>
      <line x1="6" y1="220" x2="30" y2="220"/><line x1="6" y1="210" x2="30" y2="210"/>
      <line x1="6" y1="200" x2="30" y2="200"/><line x1="6" y1="190" x2="30" y2="190"/>
      <line x1="6" y1="180" x2="30" y2="180"/><line x1="6" y1="170" x2="30" y2="170"/>
      <line x1="6" y1="160" x2="30" y2="160"/><line x1="6" y1="150" x2="30" y2="150"/>
      <line x1="6" y1="140" x2="30" y2="140"/>
    </g>

    <!-- Entrance Hall 8'6 x 5' -->
    <rect x="36" y="390" width="45" height="30" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
    <text x="58" y="408" text-anchor="middle" font-size="9" fill="#333">ENTRANCE</text>
    <text x="58" y="418" text-anchor="middle" font-size="8" fill="#666">8&apos;6&quot; × 5&apos;</text>
    <!-- Front door -->
    <line x1="48" y1="420" x2="48" y2="410" stroke="#333" stroke-width="2"/>
    <path d="M 48 410 A 8 8 0 0 1 56 418" fill="none" stroke="#333" stroke-width="1"/>

    <!-- Lounge 15'11 x 10'8 (parlor) - front right with bay -->
    <rect x="36" y="326" width="60" height="64" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="66" y="352" text-anchor="middle" font-size="10" font-weight="600" fill="#333">LOUNGE</text>
    <text x="66" y="364" text-anchor="middle" font-size="8" fill="#666">(parlor)</text>
    <text x="66" y="376" text-anchor="middle" font-size="8" fill="#666">15&apos;11&quot; × 10&apos;8&quot;</text>
    <!-- Bay windows -->
    <rect x="36" y="356" width="60" height="12" fill="#d6eaf8" stroke="#2980b9" stroke-width="1"/>
    <text x="66" y="365" text-anchor="middle" font-size="7" fill="#2980b9">bay</text>

    <!-- Living Room 13'7 x 10'8 -->
    <rect x="36" y="244" width="60" height="82" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="66" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#333">LIVING</text>
    <text x="66" y="292" text-anchor="middle" font-size="8" fill="#666">13&apos;7&quot; × 10&apos;8&quot;</text>

    <!-- WALL TO REMOVE (between lounge and living - existing opening may exist; brief = full removal) -->
    <rect x="36" y="324" width="60" height="4" fill="url(#hatch-remove)"/>
    <text x="100" y="328" font-size="9" fill="#c0392b" font-weight="600">Phase 1: remove wall</text>

    <!-- Open zone shading after removal -->
    <rect x="36" y="244" width="60" height="82" fill="url(#hatch-open)" opacity="0.35"/>

    <!-- Dining 7 x 9'8 -->
    <rect x="36" y="186" width="28" height="58" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="50" y="210" text-anchor="middle" font-size="9" fill="#333">DINING</text>
    <text x="50" y="222" text-anchor="middle" font-size="7" fill="#666">7&apos;×9&apos;8&quot;</text>

    <!-- Bath -->
    <rect x="64" y="186" width="32" height="58" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="80" y="218" text-anchor="middle" font-size="9" fill="#333">BATH</text>

    <!-- Kitchen 9'9 x 16 -->
    <rect x="36" y="120" width="60" height="66" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="66" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#333">KITCHEN</text>
    <text x="66" y="160" text-anchor="middle" font-size="8" fill="#666">9&apos;9&quot; × 16&apos;</text>
    <!-- L counter -->
    <polyline points="36,186 36,130 90,130" fill="none" stroke="#bbb" stroke-width="4"/>

    <!-- REAR WALL - Phase 2A blow-out -->
    <rect x="36" y="118" width="60" height="4" fill="#2980b9" opacity="0.5" stroke="#2980b9" stroke-width="2"/>
    <text x="66" y="108" text-anchor="middle" font-size="9" fill="#2980b9" font-weight="700">Phase 2A: rear wall ’ glazing</text>

    <!-- Rear yard + deck -->
    <rect x="24" y="60" width="84" height="52" fill="#e8f6e8" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4 2"/>
    <rect x="36" y="72" width="60" height="18" fill="#d5d5d5" stroke="#666" stroke-width="1"/>
    <text x="66" y="84" text-anchor="middle" font-size="8" fill="#333">deck (flush w/ kitchen)</text>
    <text x="66" y="100" text-anchor="middle" font-size="8" fill="#27ae60">rear yard</text>

    <!-- Dimension: width -->
    <line x1="36" y1="440" x2="96" y2="440" stroke="#333" stroke-width="1" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <text x="66" y="455" text-anchor="middle" font-size="9" fill="#333">~15&apos; interior + bay</text>

    <!-- Front label -->
    <text x="66" y="475" text-anchor="middle" font-size="11" font-weight="700" fill="#333">FRONT  45th St</text>
    <text x="66" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#333">REAR  yard</text>
  </g>

  <!-- FIRST FLOOR - rental unit -->
  <text x="480" y="92" font-size="16" font-weight="700" fill="#111">First floor  rental unit (Unit 2)</text>

  <g transform="translate(480, 110)">
    <rect x="0" y="120" width="90" height="300" fill="#fff" stroke="#333" stroke-width="2"/>
    <path d="M 36 420 L 36 356 L 96 356 L 96 420 Z" fill="#fff" stroke="#333" stroke-width="2"/>

    <!-- Stair hall - CLOSED at top (Phase 1 banister wall) -->
    <rect x="0" y="120" width="36" height="300" fill="#eee" stroke="#333" stroke-width="1.5"/>
    <rect x="0" y="300" width="36" height="8" fill="#c0392b" opacity="0.6"/>
    <text x="18" y="295" text-anchor="middle" font-size="7" fill="#c0392b" transform="rotate(-90 18 295)">fire wall</text>

    <!-- Family room 18 x 13'8 - stairs open here today -->
    <rect x="36" y="218" width="60" height="82" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="66" y="252" text-anchor="middle" font-size="9" font-weight="600" fill="#333">FAMILY RM</text>
    <text x="66" y="264" text-anchor="middle" font-size="7" fill="#666">18&apos; × 13&apos;8&quot;</text>
    <text x="66" y="276" text-anchor="middle" font-size="7" fill="#c0392b">’ future kitchen</text>

    <!-- Banister closure -->
    <rect x="36" y="298" width="24" height="6" fill="url(#hatch-remove)"/>
    <text x="100" y="304" font-size="8" fill="#c0392b">Phase 1: close banister + transom door</text>

    <!-- Bed 1 11'5 x 7 -->
    <rect x="36" y="356" width="24" height="42" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="48" y="378" text-anchor="middle" font-size="8" fill="#333">BED 1</text>

    <!-- Bed 2 16 x 9'4 with bay -->
    <rect x="60" y="326" width="36" height="56" fill="#fff" stroke="#999" stroke-width="1"/>
    <rect x="60" y="356" width="36" height="10" fill="#d6eaf8" stroke="#2980b9" stroke-width="1"/>
    <text x="78" y="348" text-anchor="middle" font-size="8" fill="#333">BED 2</text>

    <!-- Bed 3 13'10 x 16 -->
    <rect x="36" y="120" width="60" height="66" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="66" y="150" text-anchor="middle" font-size="8" fill="#333">BED 3</text>
    <text x="66" y="162" text-anchor="middle" font-size="7" fill="#666">13&apos;10&quot;×16&apos;</text>

    <!-- Bath -->
    <rect x="36" y="186" width="32" height="32" fill="#fff" stroke="#999" stroke-width="1"/>
    <text x="52" y="204" text-anchor="middle" font-size="8" fill="#333">BATH</text>

    <text x="66" y="475" text-anchor="middle" font-size="10" fill="#666">Separate unit  no rear blow-out</text>
  </g>

  <!-- REAR ELEVATION (kitchen wall) -->
  <text x="40" y="620" font-size="16" font-weight="700" fill="#111">Rear elevation  kitchen wall (Option A, Alt-2)</text>

  <g transform="translate(40, 640)">
    <!-- Brick wall outline 15' wide x ~9' tall kitchen ceiling -->
    <rect x="0" y="40" width="90" height="54" fill="#d7ccc8" stroke="#333" stroke-width="2"/>
    <!-- Party walls -->
    <rect x="-8" y="20" width="8" height="94" fill="#bbb" stroke="#333" stroke-width="1"/>
    <rect x="90" y="20" width="8" height="94" fill="#bbb" stroke="#333" stroke-width="1"/>
    <!-- Parapet / floor above -->
    <rect x="-8" y="10" width="106" height="12" fill="#999" stroke="#333" stroke-width="1"/>
    <text x="45" y="8" text-anchor="middle" font-size="8" fill="#666">floor above (rental)</text>

    <!-- Existing: small door + window (crossed out) -->
    <rect x="12" y="58" width="14" height="28" fill="#fff" stroke="#999" stroke-width="1"/>
    <line x1="12" y1="58" x2="26" y2="86" stroke="#c0392b" stroke-width="1"/>
    <line x1="26" y1="58" x2="12" y2="86" stroke="#c0392b" stroke-width="1"/>
    <rect x="58" y="52" width="20" height="24" fill="#d6eaf8" stroke="#999" stroke-width="1"/>
    <line x1="58" y1="52" x2="78" y2="76" stroke="#c0392b" stroke-width="1"/>
    <line x1="78" y1="52" x2="58" y2="76" stroke="#c0392b" stroke-width="1"/>

    <!-- New glazing - full width -->
    <rect x="4" y="44" width="82" height="46" fill="#a8d4f0" stroke="#2980b9" stroke-width="2" opacity="0.85"/>
    <!-- Door panels -->
    <line x1="45" y1="44" x2="45" y2="90" stroke="#2980b9" stroke-width="1"/>
    <line x1="4" y1="67" x2="86" y2="67" stroke="#2980b9" stroke-width="1"/>
    <text x="45" y="72" text-anchor="middle" font-size="8" fill="#1a5276">sliding / folding glass</text>

    <!-- Steel lintel -->
    <rect x="-4" y="38" width="98" height="6" fill="#555" stroke="#333" stroke-width="1"/>
    <text x="45" y="35" text-anchor="middle" font-size="8" fill="#333" font-weight="600">steel lintel + header</text>

    <!-- Deck -->
    <rect x="0" y="94" width="90" height="12" fill="#888" stroke="#333" stroke-width="1"/>
    <text x="45" y="103" text-anchor="middle" font-size="8" fill="#fff">deck</text>
    <!-- Yard grade -->
    <rect x="-10" y="106" width="110" height="24" fill="#c8e6c9" stroke="#27ae60" stroke-width="1"/>
    <text x="45" y="120" text-anchor="middle" font-size="8" fill="#2e7d32">yard (grade)</text>

    <text x="45" y="145" text-anchor="middle" font-size="9" fill="#333">~15&apos; wide rear wall · kitchen + dining zone behind</text>
  </g>

  <!-- Legend -->
  <g transform="translate(480, 640)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#111">Legend</text>
    <rect x="0" y="12" width="20" height="8" fill="url(#hatch-remove)"/>
    <text x="28" y="20" font-size="11" fill="#333">Wall removal (Phase 1 must-have)</text>
    <rect x="0" y="32" width="20" height="8" fill="#2980b9" opacity="0.5"/>
    <text x="28" y="40" font-size="11" fill="#333">Rear wall ’ glazing (Phase 2A, Alt-2)</text>
    <rect x="0" y="52" width="20" height="8" fill="url(#hatch-open)" opacity="0.5"/>
    <text x="28" y="60" font-size="11" fill="#333">Open parlor zone after wall removal</text>
    <rect x="0" y="72" width="20" height="8" fill="#c0392b" opacity="0.5"/>
    <text x="28" y="80" font-size="11" fill="#333">Banister closure / fire separation (Unit 2)</text>
    <text x="0" y="110" font-size="11" fill="#555">Basement (38&apos;4&quot;×15&apos;) not shown  no dig-out in scope.</text>
    <text x="0" y="128" font-size="11" fill="#555">Lot: 17.33&apos; × 100.17&apos; · IBZ overlay  confirm ZoLa before any extension.</text>
  </g>

  <!-- Flow arrow -->
  <text x="460" y="1160" text-anchor="middle" font-size="12" fill="#555">
    Owner experience: bay-window lounge ’ open parlor ’ kitchen/dining ’ glass wall ’ deck ’ yard
  </text>
</svg>
